services:
  zeroclaw-hub:
    build:
      context: .
      dockerfile: Dockerfile
    image: zeroclaw-hub:local
    # One container per tenant; the slug also becomes the docker compose
    # project name (`docker compose -p zeroclaw-<slug>`) so multiple tenants
    # coexist on the same host without colliding.
    container_name: zeroclaw-hub-${USER_SLUG}
    restart: unless-stopped
    env_file:
      - tenants/${USER_SLUG}/.env
    environment:
      # Route the bundled `claude` CLI through the in-container deepseek-proxy
      # (127.0.0.1:8089) so it shares the same thinking-strip behavior ZeroClaw
      # gets. The proxy forwards to https://api.deepseek.com/anthropic.
      ANTHROPIC_BASE_URL: http://127.0.0.1:8089
      ANTHROPIC_AUTH_TOKEN: ${DEEPSEEK_API_KEY}
    ports:
      # VM loopback only; never exposed to the public internet. The dashboard
      # is reached via `ruby deploy.rb tunnel <slug>`. Each tenant uses a
      # different ZEROCLAW_GATEWAY_PORT (set in tenants/<slug>/.env) so
      # multiple tenants can run side by side on one VM.
      - "127.0.0.1:${ZEROCLAW_GATEWAY_PORT}:42617"
    volumes:
      - ./tenants/${USER_SLUG}/config/zeroclaw:/root/.zeroclaw
      - ./tenants/${USER_SLUG}/config/claude:/root/.claude
      - ./tenants/${USER_SLUG}/workspace:/workspace
    stdin_open: true
    tty: true
    healthcheck:
      test: ["CMD-SHELL", "zeroclaw status >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
